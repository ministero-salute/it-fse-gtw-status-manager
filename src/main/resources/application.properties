#######################################
#	Application name
#######################################
server.port=8081
spring.application.name=gtw-status-manager
server.servlet.context-path=/

#######################################
#	Application monitoring
#######################################
info.app.name=Gateway Status Manager - FSE 2.0
info.app.description=Gateway Status Manager for FSE 2.0
info.app.version=3.0.0_AVICENNA

management.server.port=8081
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.live=status
management.endpoints.web.path-mapping.health=health/ready
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoints.web.path-mapping.prometheus=metrics
management.endpoints.web.path-mapping.metrics=actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,live,ready,env,info
management.health.db.enabled=true
management.endpoint.health.show-details=always
 
#######################################
#	Open API
#######################################
springdoc.swagger-ui.path=/openapi/ui

docs.info.contact.name=Mario Rossi
docs.info.contact.mail=mariorossi@ibm.com
docs.info.contact.url=www.example.com
docs.info.termsOfService=www.terms.com
docs.info.summary=Gateway Status manager
docs.info.description=Gateway Status manager
docs.info.api-id=1
docs.info.title=Gateway Status manager

####### LOGGING OUTPUT FORMAT ############
# Must be one of console, json
#######################################
log.output.format=console

#######################################
#	DISABLE NULL ON JSON
#######################################
spring.jackson.default-property-inclusion=NON_NULL

#######################################
# DATASOURCE DB
#######################################
spring.data.mongodb.uri=${MONGO_URI_SRV}${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_ADDRESS}${MONGO_SUFFIX}
spring.data.mongodb.max.staleness=91
spring.data.mongodb.database=FSE_GTW

#######################################
#  KAFKA 
#######################################
####KAFKA CONNECTION SETTINGS ##########
kafka.bootstrap-servers=${KAFKA_ADDRESS}
kafka.properties.security.protocol=SASL_SSL
kafka.properties.sasl.mechanism=SCRAM-SHA-256
kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username='${kafka_user-it-dgc-certificate-service}' password='${kafka_password-it-dgc-certificate-service}';
kafka.properties.ssl.truststore.location=/config/resources/security/truststore.jks
kafka.properties.ssl.truststore.password=${TRUST_JKS_PASSWORD}

#######KAFKA PRODUCER SETTING################
kafka.client-id=fse-status-manager-client
kafka.client-eds-id=fse-status-manager-client-eds
kafka.producer.retries=5
kafka.producer.key-serializer= org.apache.kafka.common.serialization.StringSerializer
kafka.producer.value-serializer= org.apache.kafka.common.serialization.StringSerializer
kafka.producer.enable.idempotence=true
kafka.producer.ack=all
#######KAFKA PRODUCER SETTING################

#######KAFKA CONSUMER SETTING################
kafka.consumer.group-id=fse-notifier
kafka.consumer.group-id-eds=fse-notifier-eds
kafka.consumer.key-deserializer= org.apache.kafka.common.serialization.StringDeserializer
kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
kafka.consumer.auto-offset-reset=earliest
kafka.consumer.isolation.level=read_committed
kafka.consumer.auto-commit=false
#######KAFKA CONSUMER SETTING################

####KAFKA CODE ##########
event.topic.auto.start=true
kafka.statusmanager.topic=MDS-SA-0004_FU_001_STATUS
kafka.statusmanager.eds.topic=MDS-SA-0004_FU_002_STATUS
kafka.statusmanager.deadletter.topic=MDS-SA-0004_FU_001_STATUS-DLT
kafka.statusmanager.eds.deadletter.topic=MDS-SA-0004_FU_002_STATUS-DLT

####### KAFKA DEAD LETTER #####################
kafka.consumer.dead-letter-exc={'it.finanze.sanita.fse2.ms.gtw.statusmanager.exceptions.BusinessException','java.lang.NullPointerException', 'it.finanze.sanita.fse2.ms.gtw.statusmanager.exceptions.RemoteServiceNotAvailableException'}

#######################################
#  Scheduler
#######################################
scheduler.tx-scheduler=-
scheduler.eds-status-check-scheduler=0 */1 * * * *
# la pull agisce per gli eventi che al momento della partenza dello scheduler, hanno status non finale vecchio di almeno i minuti indicati in questa property
# limite massimo di transazioni da processare per ogni esecuzione dello scheduler
scheduler.eds-status-check.max-results=100
scheduler.eds-status-check.event-age-threshold-minutes=1

##################################
# Microservices
##################################
ms.url.eds-broker=http://it-fse-datarepo-processor.fse-eds-ms-${SERVICE_ADDRESS}
ms.url.gtw-config=http://it-fse-gtw-config.fse-gtw-ms-${SERVICE_ADDRESS}
ms.url.eds-client=http://it-fse-gtw-eds-client.fse-gtw-ms-${SERVICE_ADDRESS}

######################################
# TIME RATE REFRESH CONFIG (milliseconds)
######################################
ms.config.refresh-rate=900000

kafka.oauth.tenantId=${TENANT_ID}
kafka.oauth.appId=${APP_ID}
kafka.oauth.pfxPathName=${PFX_NAME_RESOURCE_PATH}
kafka.oauth.pwd=${PFX_PASSWORD}

#####################################
# OPENTELEMETRY
#####################################
otel.traces.exporter=otlp
otel.logs.exporter=none
otel.metrics.exporter=none
otel.propagators=tracecontext,baggage
########OPENTELEMETRY################################
## Configure exporter endpoints for traces and metrics
## Set the property based on the environment where you want to enable telemetry.
# 1 \u2192 All traces are sent. 0 \u2192 Telemetry is disabled.
otel.traces.sampler=traceidratio
otel.traces.sampler.arg=1.0

## Configure exporter endpoints for traces and metrics
otel.exporter.otlp.protocol=http/protobuf
otel.exporter.otlp.endpoint=http://instana-agent.instana-agent:4318
otel.instrumentation.mongodb.enabled=true